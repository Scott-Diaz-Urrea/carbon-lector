<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>LEO вҖ” Lenguaje y MatemГЎticas jugando</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #EEF9F6;
    --bg-deep: #DFF3EE;
    --paper: #FFFFFF;
    --ink: #1D3557;
    --ink-soft: #4A5C7A;
    --primary: #12A594;
    --primary-dark: #0C7C70;
    --orange: #FFB627;
    --orange-dark: #F0932B;
    --coral: #FF6B6B;
    --coral-dark: #E85555;
    --violet: #7C6FF0;
    --star: #FFD23F;
    --locked: #C7D0DE;
    --locked-ink: #8E9BB3;
    --radius-lg: 28px;
    --radius-md: 18px;
    --radius-sm: 12px;
    --shadow: 0 10px 30px rgba(29, 53, 87, 0.12);
    --shadow-sm: 0 4px 12px rgba(29, 53, 87, 0.10);
    --font-display: 'Baloo 2', system-ui, sans-serif;
    --font-body: 'Quicksand', system-ui, sans-serif;
  }

  *{ box-sizing: border-box; }
  html, body{ height: 100%; }
  body{
    margin: 0;
    font-family: var(--font-body);
    color: var(--ink);
    background:
      radial-gradient(circle at 12% 8%, var(--bg-deep), transparent 45%),
      radial-gradient(circle at 88% 92%, var(--bg-deep), transparent 45%),
      var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
  }
  button{ font-family: inherit; }
  :focus-visible{ outline: 3px solid var(--violet); outline-offset: 3px; border-radius: 8px; }

  #app{
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
    padding-bottom: 24px;
  }

  /* ---------- Top bar ---------- */
  .topbar{
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: rgba(238, 249, 246, 0.85);
    backdrop-filter: blur(6px);
    gap: 8px;
  }
  .backbtn{
    width: 44px; height: 44px;
    flex-shrink: 0;
    border-radius: 50%;
    border: none;
    background: var(--paper);
    box-shadow: var(--shadow-sm);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--ink);
    transition: transform .15s ease;
  }
  .backbtn:active{ transform: scale(0.92); }
  .backbtn.hidden{ visibility: hidden; }

  .topbar-right{ display: flex; gap: 8px; }
  .pill{
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--paper);
    padding: 8px 12px;
    border-radius: 999px;
    box-shadow: var(--shadow-sm);
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 13px;
    white-space: nowrap;
  }
  .pill svg{ width: 15px; height: 15px; flex-shrink: 0; }
  .xppill{ color: var(--violet); }
  .starpill{ color: var(--ink); }

  /* ---------- Generic screen padding ---------- */
  .screen{ padding: 4px 20px 40px; animation: fadeUp .35s ease both; }
  @keyframes fadeUp{
    from{ opacity: 0; transform: translateY(10px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  /* ---------- Home ---------- */
  .home-hero{ text-align: center; padding-top: 10px; }
  .logo-word{
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 64px;
    letter-spacing: 2px;
    color: var(--primary-dark);
    margin: 6px 0 0;
    text-shadow: 3px 3px 0 var(--orange);
  }
  .logo-tag{
    font-weight: 600;
    color: var(--ink-soft);
    font-size: 17px;
    margin: 2px 0 22px;
  }
  .mascot-wrap{ display:flex; justify-content:center; margin: 6px 0 10px; }
  .mascot-wrap svg{ filter: drop-shadow(0 12px 16px rgba(29,53,87,0.18)); }
  .float{ animation: floaty 3.4s ease-in-out infinite; }
  @keyframes floaty{
    0%,100%{ transform: translateY(0px) rotate(-1deg); }
    50%{ transform: translateY(-10px) rotate(1deg); }
  }

  .cta-btn{
    display: block;
    width: 100%;
    border: none;
    border-radius: 999px;
    padding: 18px 20px;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 20px;
    color: #fff;
    background: var(--coral);
    box-shadow: 0 8px 0 var(--coral-dark);
    cursor: pointer;
    transition: transform .08s ease, box-shadow .08s ease;
  }
  .cta-btn:active{ transform: translateY(6px); box-shadow: 0 2px 0 var(--coral-dark); }

  .home-footnote{
    margin-top: 26px;
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.5;
    background: var(--paper);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    box-shadow: var(--shadow-sm);
  }
  .home-footnote b{ color: var(--primary-dark); }

  /* ---------- Section heading ---------- */
  .section-title{
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 26px;
    margin: 6px 0 2px;
    color: var(--ink);
  }
  .section-sub{
    font-size: 14px;
    color: var(--ink-soft);
    margin: 0 0 18px;
    font-weight: 600;
  }
  .curric-badge{
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #E8FBF6;
    color: var(--primary-dark);
    border: 1.5px solid #BDEEE3;
    font-weight: 700;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 999px;
    margin-bottom: 14px;
  }

  /* ---------- Subject cards ---------- */
  .subject-list{ display:flex; flex-direction:column; gap:14px; margin-top:10px; }
  .subject-card{
    display:flex; align-items:center; gap:14px;
    background: var(--paper);
    border:none; border-radius: var(--radius-lg);
    padding: 18px; box-shadow: var(--shadow-sm);
    cursor:pointer; text-align:left; width:100%;
    transition: transform .1s ease;
  }
  .subject-card:active{ transform: scale(0.98); }
  .subject-card.locked{ opacity:0.55; }
  .subject-icon{ font-size:34px; flex-shrink:0; }
  .subject-info{ display:flex; flex-direction:column; gap:2px; flex:1; }
  .subject-info b{ font-family: var(--font-display); font-size:18px; }
  .subject-info small{ color: var(--ink-soft); font-weight:600; font-size:12.5px; }
  .subject-stars{ font-weight:800; font-size:13px; color: var(--ink-soft); white-space:nowrap; }

  /* ---------- Path map ---------- */
  .map-wrap{ position: relative; width: 100%; margin-top: 6px; }
  .map-wrap svg.path-line{ position: absolute; inset: 0; width: 100%; height: 100%; }
  .node{
    position: absolute;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    cursor: pointer;
    width: 92px;
  }
  .node-circle{
    width: 74px; height: 74px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 26px;
    color: #fff;
    box-shadow: 0 8px 0 rgba(0,0,0,0.15), var(--shadow);
    transition: transform .12s ease;
    border: 4px solid rgba(255,255,255,0.6);
  }
  .node:active .node-circle{ transform: scale(0.93) translateY(3px); }
  .node-circle.open{ background: linear-gradient(160deg, var(--primary), var(--primary-dark)); }
  .node-circle.locked{ background: var(--locked); color: var(--locked-ink); box-shadow: 0 8px 0 #b3bdcf, var(--shadow-sm); }
  .node-label{
    font-weight: 700;
    font-size: 12.5px;
    text-align: center;
    color: var(--ink);
    background: rgba(255,255,255,0.9);
    padding: 3px 9px;
    border-radius: 999px;
    box-shadow: var(--shadow-sm);
    white-space: nowrap;
  }
  .node-label.locked{ color: var(--locked-ink); }
  .node-stars{ display: flex; gap: 2px; }
  .node-stars svg{ width: 13px; height: 13px; }

  /* ---------- Toast ---------- */
  .toast{
    position: fixed;
    left: 50%; bottom: 26px;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: #fff;
    padding: 13px 20px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 14.5px;
    box-shadow: var(--shadow);
    z-index: 50;
    opacity: 0;
    transition: all .25s ease;
    pointer-events: none;
    max-width: 90%;
    text-align: center;
  }
  .toast.show{ opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---------- Difficulty cards (memorama) ---------- */
  .diff-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:14px; }
  .locked-panel{
    background: var(--paper); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);
    padding: 40px 24px; text-align:center; color: var(--ink-soft); font-weight:600; font-size:14px; margin-top:16px;
  }
  .lock-ic{ font-size:38px; display:block; margin-bottom:10px; }
  .diff-card{
    background: var(--paper); border:3px solid #E1EEEA; border-radius: var(--radius-md);
    padding: 22px 10px; text-align:center; cursor:pointer; box-shadow: var(--shadow-sm);
    display:flex; flex-direction:column; align-items:center; gap:4px;
  }
  .diff-card:active{ transform: scale(0.96); }
  .diff-emoji{ font-size:36px; }
  .diff-card b{ font-family: var(--font-display); font-size:16px; color:var(--ink); }
  .diff-card span:last-child{ font-size:12px; color:var(--ink-soft); font-weight:600; }

  /* ---------- Game: shared ---------- */
  .game-progress{ display:flex; align-items:center; gap:10px; margin-bottom:18px; flex-wrap: wrap; }
  .progress-track{ flex:1; height: 12px; background:#DCEDE8; border-radius:999px; overflow:hidden; min-width: 60px; }
  .progress-fill{
    height:100%; background: linear-gradient(90deg, var(--orange), var(--coral)); border-radius:999px;
    transition: width .35s ease;
  }
  .progress-num{ font-weight:700; font-size:13px; color:var(--ink-soft); white-space:nowrap; }
  .streak-chip{
    background:#FFF1D6; color:#B9740A; font-weight:800; font-size:13px;
    padding:4px 10px; border-radius:999px; display:flex; align-items:center; gap:3px;
    white-space:nowrap; animation: pulseChip .5s ease;
  }
  @keyframes pulseChip{ 0%{transform:scale(0.8);} 60%{transform:scale(1.15);} 100%{transform:scale(1);} }

  .prompt-card{
    background: var(--paper);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    padding: 30px 20px 26px;
    text-align: center;
    margin-bottom: 22px;
  }
  .prompt-emoji{ font-size: 68px; line-height:1; margin-bottom: 10px; display:block; }
  .prompt-word{
    font-family: var(--font-display);
    font-size: 34px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--ink);
    margin: 4px 0 4px;
  }
  .prompt-word .blank{ color: var(--coral); }
  .blank{ color: var(--coral); }
  .prompt-count{ font-size: 28px; line-height:1.6; letter-spacing:2px; margin: 8px 0; word-spacing:2px; }
  .mgroup{ display:inline-block; margin: 0 8px 6px; padding: 4px 8px; border-radius:10px; background:#F3FBF9; }
  .op-sign{ color: var(--coral); font-weight:800; font-family: var(--font-display); margin: 0 4px; }
  .prompt-hint{ font-size: 13px; color: var(--ink-soft); font-weight: 600; }
  .prompt-hint b{ color: var(--coral-dark); }
  .speak-btn{
    margin-top: 12px;
    border: none;
    background: #E8FBF6;
    color: var(--primary-dark);
    font-weight: 700;
    font-size: 13.5px;
    padding: 9px 16px;
    border-radius: 999px;
    cursor: pointer;
    display: inline-flex; align-items:center; gap:6px;
  }

  .option-grid{
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  .option-grid.panels{ grid-template-columns: 1fr; }
  .option-btn{
    border: 3px solid #E1EEEA;
    background: var(--paper);
    border-radius: var(--radius-md);
    padding: 20px 10px;
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 30px;
    color: var(--ink);
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: transform .1s ease, background .15s ease, border-color .15s ease;
  }
  .option-btn:active{ transform: scale(0.95); }
  .option-btn.panel{ font-size: 24px; letter-spacing: 3px; padding: 20px 12px; line-height: 1.4; word-spacing: 4px; }
  .option-btn.wordopt{ font-size: 18px; letter-spacing: 0.5px; padding: 16px 8px; line-height: 1.25; }
  .prompt-sentence{ font-family: var(--font-display); font-weight: 700; font-size: 21px; line-height: 1.45; color: var(--ink); margin: 4px 0 10px; }
  .shape-display{ display: flex; justify-content: center; margin: 8px 0 12px; }
  .option-btn.correct{ background: #DFF6E8; border-color: #7FD9A3; color: #1E7A44; }
  .option-btn.wrong{ background: #FFE3E1; border-color: #FFA9A3; color: #B23A33; animation: shake .35s ease; }
  @keyframes shake{
    0%,100%{ transform: translateX(0); }
    25%{ transform: translateX(-6px); }
    75%{ transform: translateX(6px); }
  }

  /* ---------- Syllable game ---------- */
  .syll-slots{ display:flex; gap:8px; justify-content:center; margin: 12px 0 4px; flex-wrap: wrap; }
  .syll-slot{
    min-width: 58px; height: 54px; border: 3px dashed #CBD9D4; border-radius: 12px;
    display:flex; align-items:center; justify-content:center;
    font-family: var(--font-display); font-weight: 800; font-size: 22px; color: var(--ink);
    padding: 0 6px;
  }
  .syll-slot.filled{ border-style: solid; border-color: #BFE3DA; background: #F3FBF9; }
  .syll-slot.correct{ background:#DFF6E8; border-color:#7FD9A3; color:#1E7A44; }
  .syll-slot.wrong{ background:#FFE3E1; border-color:#FFA9A3; color:#B23A33; }
  .syll-tiles{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top: 8px; }
  .syll-tile{
    border: 3px solid #E1EEEA; background: var(--paper); border-radius: 14px;
    padding: 15px 18px; font-family: var(--font-display); font-weight: 800; font-size: 21px;
    color: var(--ink); cursor:pointer; box-shadow: var(--shadow-sm);
  }
  .syll-tile:active{ transform: scale(0.94); }
  .syll-tile.used{ opacity: 0.2; pointer-events: none; }

  /* ---------- Secuencia game ---------- */
  .seq-slots{ display:flex; gap:10px; justify-content:center; margin: 12px 0 4px; flex-wrap: wrap; }
  .seq-slot{
    min-width: 92px; min-height: 78px; border: 3px dashed #CBD9D4; border-radius: 14px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 6px;
    font-family: var(--font-display); font-weight: 800; font-size: 20px; color: var(--locked-ink);
  }
  .seq-slot.filled{ border-style: solid; border-color: #BFE3DA; background: #F3FBF9; }
  .seq-slot.correct{ background:#DFF6E8; border-color:#7FD9A3; }
  .seq-slot.wrong{ background:#FFE3E1; border-color:#FFA9A3; }
  .seq-tiles{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top: 10px; }
  .seq-tile{
    border: 3px solid #E1EEEA; background: var(--paper); border-radius: 16px;
    padding: 12px 14px; cursor:pointer; box-shadow: var(--shadow-sm);
    display:flex; flex-direction:column; align-items:center; gap:4px; min-width: 84px;
  }
  .seq-tile:active{ transform: scale(0.95); }
  .seq-tile.used{ opacity: 0.2; pointer-events: none; }
  .seq-emoji{ font-size: 28px; }
  .seq-text{ font-size: 11px; font-weight: 700; color: var(--ink); text-align:center; line-height:1.2; }

  /* ---------- Memory game ---------- */
  .memory-grid{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .mcard{
    aspect-ratio: 1;
    border-radius: 14px;
    cursor: pointer;
    perspective: 600px;
  }
  .mcard-inner{
    position: relative;
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform .4s ease;
  }
  .mcard.flipped .mcard-inner, .mcard.matched .mcard-inner{ transform: rotateY(180deg); }
  .mface{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    border-radius: 14px;
    backface-visibility: hidden;
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 22px;
  }
  .mface.back{
    background: linear-gradient(160deg, var(--violet), #5A4CD6);
    color: #fff;
    box-shadow: 0 6px 0 #4A3EBB;
  }
  .mface.front{
    background: var(--paper);
    color: var(--primary-dark);
    transform: rotateY(180deg);
    border: 3px solid #E1EEEA;
  }
  .mcard.matched .mface.front{ background:#DFF6E8; border-color:#7FD9A3; color:#1E7A44; }

  /* ---------- Result overlay ---------- */
  .overlay{
    position: fixed; inset: 0;
    background: rgba(29,53,87,0.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 60;
    padding: 20px;
    animation: fadeIn .25s ease;
  }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  .result-card{
    background: var(--paper);
    border-radius: var(--radius-lg);
    padding: 30px 26px;
    text-align: center;
    max-width: 340px;
    width: 100%;
    box-shadow: var(--shadow);
    animation: pop .3s ease;
    position: relative;
    overflow: hidden;
  }
  @keyframes pop{ from{ transform: scale(0.85); opacity:0;} to{ transform: scale(1); opacity:1;} }
  .result-stars{ display:flex; justify-content:center; gap:8px; margin: 14px 0 6px; }
  .result-stars svg{ width: 40px; height: 40px; }
  .result-title{ font-family: var(--font-display); font-weight:800; font-size:24px; margin: 4px 0; color: var(--ink); }
  .result-sub{ font-size: 14px; color: var(--ink-soft); font-weight:600; margin-bottom: 10px; }
  .badge-unlock{
    background:#FFF1D6; color:#8A5A00; font-weight:700; font-size:13px;
    padding:10px 12px; border-radius: var(--radius-sm); margin-bottom: 16px;
  }
  .result-actions{ display:flex; gap:10px; margin-top: 6px; }
  .result-actions .cta-btn{ flex:1; width:auto; font-size:14.5px; padding:14px 8px; }
  .cta-btn.secondary{
    background: var(--paper); color: var(--ink);
    box-shadow: 0 6px 0 #D8E2DE; border: 2px solid #E1EEEA;
  }
  .cta-btn.secondary:active{ transform: translateY(4px); box-shadow: 0 2px 0 #D8E2DE; }

  .confetti-piece{
    position:absolute; top:-12px; width:8px; height:14px; border-radius:2px;
    animation: confettiFall 1.5s ease-in forwards; opacity:0.95;
  }
  @keyframes confettiFall{ to{ transform: translateY(360px) rotate(420deg); opacity:0; } }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
</style>
</head>

<div id="app"></div>

/* ---------------- Voz (elige la mejor voz disponible) ---------------- */
let cachedVoices = [];
function loadVoices(){
  if('speechSynthesis' in window){
    cachedVoices = window.speechSynthesis.getVoices();
  }
}
if('speechSynthesis' in window){
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}
function pickBestVoice(){
  const es = cachedVoices.filter(v=>v.lang && v.lang.toLowerCase().indexOf('es')===0);
  if(!es.length) return null;
  function score(v){
    let s=0;
    if(/google/i.test(v.name)) s+=5;
    if(/natural|neural|online|premium/i.test(v.name)) s+=4;
    if(/paulina|mГіnica|monica|helena|sabina|elvira|lucia|lupe|laura/i.test(v.name)) s+=3;
    if(v.localService===false) s+=1;
    return s;
  }
  return es.slice().sort((a,b)=>score(b)-score(a))[0];
}
function speak(text){
  try{
    if(!('speechSynthesis' in window)) return;
    const utter = new SpeechSynthesisUtterance(text);
    const v = pickBestVoice();
    if(v) utter.voice = v;
    utter.lang = (v && v.lang) || 'es-ES';
    utter.rate = 0.96;
    utter.pitch = 1.08;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utter);
  }catch(e){ /* la app funciona igual sin voz */ }
}

/* ---------------- Sonidos (Web Audio, sin archivos externos) ---------------- */
let actx = null;
function getActx(){
  if(!actx){
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(Ctx) actx = new Ctx();
  }
  return actx;
}
function beep(freq, dur, delay, vol){
  try{
    const ctx = getActx();
    if(!ctx) return;
    const t0 = ctx.currentTime + (delay||0);
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(vol||0.15, t0+0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t0+dur);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t0);
    osc.stop(t0+dur+0.03);
  }catch(e){}
}

/* ---------------- Utilidades ---------------- */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function randInt(min,max){ return min + Math.floor(Math.random()*(max-min+1)); }
function uniqueDistractors(correct, min, max, spread, count){
  const set = new Set([correct]);
  let guard = 0;
  while(set.size<count && guard<200){
    guard++;
    const d = correct + randInt(-spread, spread);
    if(d>=min && d<=max) set.add(d);
  }
  let filler = min;
  while(set.size<count && filler<=max){ set.add(filler); filler++; }
  return shuffle([...set]);
}

function spawnConfetti(container){
  const colors = ['#FF6B6B','#FFB627','#12A594','#7C6FF0','#FFD23F'];
  for(let i=0;i<26;i++){
    const p = document.createElement('span');
    p.className = 'confetti-piece';
    p.style.left = Math.random()*100 + '%';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay = (Math.random()*0.4) + 's';
    p.style.transform = 'rotate(' + Math.floor(Math.random()*360) + 'deg)';
    container.appendChild(p);
  }
}

function pathD(points){
  let d = 'M ' + points[0].x + ' ' + points[0].y;
  for(let i=1;i<points.length;i++){
    const p0 = points[i-1], p1 = points[i];
    const mx = (p0.x+p1.x)/2;
    d += ' Q ' + mx + ' ' + p0.y + ', ' + mx + ' ' + ((p0.y+p1.y)/2) + ' T ' + p1.x + ' ' + p1.y;
  }
  return d;
}

function renderGradeMap(){
  const nodes = GRADES.map(function(g,i){
    const pos = GRADE_POS[i];
    const cls = g.open ? 'open' : 'locked';
    const inner = g.open ? g.id : lockIconSVG(24);
    const clickAttr = g.open ? 'onclick="selectGrade('+g.id+')"' : 'onclick="showToast(\'рҹҡ§ Este nivel estГЎ en preparaciГіn\')"';
    return '<button class="node" style="left:'+pos.x+'%; top:'+(100-pos.y)+'%;" '+clickAttr+'>'+
      '<div class="node-circle '+cls+'">'+inner+'</div>'+
      '<div class="node-label '+(g.open?'':'locked')+'">'+g.label+'</div>'+
    '</button>';
  }).join('');
  const svgPts = GRADE_POS.map(function(p){ return {x:p.x, y:100-p.y}; });

  return '<div class="screen">'+
    '<p class="section-title">EducaciГіn BГЎsica</p>'+

      '</svg>'+
      nodes+
    '</div>'+
  '</div>';
}

function subjectStars(keys){

/* ---------------- Module maps ---------------- */
function renderModuleMap(title, badge, modules, positions, heightPx){
  const nodes = modules.map(function(m,i){
    const pos = positions[i];
    const st = m.key ? state.stars[m.key] : 0;
    const cls = m.open ? 'open' : 'locked';
    const inner = m.open ? (st>0 ? starSVG(true).replace('<svg','<svg width="26" height="26"') : '<span>'+(i+1)+'</span>') : lockIconSVG(22);
    const clickAttr = m.open ? 'onclick="goTo(\''+m.id+'\')"' : 'onclick="showToast(\'рҹҡ§ MГіdulo en preparaciГіn\')"';
    return '<button class="node" style="left:'+pos.x+'%; top:'+(100-pos.y)+'%;" '+clickAttr+'>'+
      '<div class="node-circle '+cls+'">'+inner+'</div>'+
      '<div class="node-label '+(m.open?'':'locked')+'">'+m.label+'</div>'+
      (m.open ? starsRow(st) : '')+
    '</button>';
  }).join('');
  const svgPts = positions.map(function(p){ return {x:p.x, y:100-p.y}; });

  return '<div class="screen">'+
    '<span class="curric-badge">'+badge+'</span>'+
    '<p class="section-title">'+title+'</p>'+
    '<div class="map-wrap" style="height:'+heightPx+'px;">'+
      '<svg class="path-line" viewBox="0 0 100 100" preserveAspectRatio="none">'+
        '<path d="'+pathD(svgPts)+'" fill="none" stroke="#CFE7E1" stroke-width="1.6" stroke-dasharray="3 3" vector-effect="non-scaling-stroke"/>'+
      '</svg>'+
      nodes+
    '</div>'+
  '</div>';
}

function genCompareRound(){
  const emojiA = pick(COUNT_EMOJIS);
  let emojiB = pick(COUNT_EMOJIS);
  if(emojiB === emojiA){ emojiB = COUNT_EMOJIS[(COUNT_EMOJIS.indexOf(emojiA)+1) % COUNT_EMOJIS.length]; }
  const nA = randInt(1,7);
  let nB = randInt(1,7);
  while(nB === nA){ nB = randInt(1,7); }
  const opts = [
    { label: new Array(nA).fill(emojiA).join(' '), value:'A' },
    { label: new Array(nB).fill(emojiB).join(' '), value:'B' },
  ];
  return {
    promptHTML: '<p class="prompt-hint">Toca el grupo que tiene <b>mГЎs</b></p>',
    options: opts,
    correctValue: nA>nB ? 'A' : 'B',
    speakText: 'ВҝCuГЎl grupo tiene mГЎs?',

    panel: true,

}

function genSaltaRound(){
  const step = pick([2,5,10]);
  const startMult = randInt(0, Math.floor(80/step));
  const start = startMult*step;
  const seq = [start, start+step, start+2*step, start+3*step, start+4*step];
  const blankIdx = randInt(1,3);
  const correct = seq[blankIdx];
  const opts = uniqueDistractors(correct, 0, 999, step*2, 4).map(function(v){ return {label:String(v), value:v}; });
  const displaySeq = seq.map(function(n,i){ return i===blankIdx ? '<span class="blank">?</span>' : n; }).join(' вҖ” ');
  return {
    promptHTML: '<p class="prompt-count" style="letter-spacing:1px;">'+displaySeq+'</p><p class="prompt-hint">ВҝQuГ© nГәmero falta en la secuencia?</p>',
    options: opts,
    correctValue: correct,
    speakText: 'ВҝQuГ© nГәmero falta?',
    cols: 4,
  };
}

function genMultiplicarRound(){
  const table = pick([2,5,10]);
  const groups = randInt(2,5);
  const emoji = pick(COUNT_EMOJIS);
  const total = table*groups;
  const groupHTML = [];
  for(let g=0; g<groups; g++){ groupHTML.push('<span class="mgroup">'+new Array(table).fill(emoji).join('')+'</span>'); }
  const opts = uniqueDistractors(total, 1, 100, table, 4).map(function(v){ return {label:String(v), value:v}; });
  return {
    promptHTML: '<p class="prompt-count">'+groupHTML.join('')+'</p><p class="prompt-hint">'+groups+' grupos de '+table+'. ВҝCuГЎntos hay en total?</p>',
    options: opts,
    correctValue: total,
    speakText: 'ВҝCuГЎnto es '+groups+' veces '+table+'?',
    cols: 4,
  };
}

function genCalendarioRound(){
  if(Math.random()<0.5){
    const idx = randInt(0, DIAS_SEMANA.length-1);
    const dia = DIAS_SEMANA[idx];

    const distract = shuffle(DIAS_SEMANA.filter(function(d){ return d!==next && d!==dia; })).slice(0,3);

    return {
      promptHTML: '<p class="prompt-hint">Si hoy es <b>'+dia+'</b>, ВҝquГ© dГӯa viene despuГ©s?</p>',
      options: opts, correctValue: next, speakText: 'ВҝQuГ© dГӯa viene despuГ©s de '+dia+'?', cols:4, kind:'word',
    };

  const distract = shuffle(MESES_ANIO.filter(function(m){ return m!==next && m!==mes; })).slice(0,3);
  const opts = shuffle([next].concat(distract)).map(function(m){ return {label:m, value:m}; });

let mc = null;

function renderMCScreen(){
  return '<div class="screen" id="mc-screen"></div>';
}

function initMCGame(key){
  const cfg = MC_GAMES[key];
  mc = { key: key, cfg: cfg, round: 0, correct: 0, streak: 0, total: cfg.rounds, current: null };
  drawMCRound();
}

function drawMCRound(){
  const el = document.getElementById('mc-screen');
  if(!el) return;
  if(mc.round >= mc.total){ finishMC(); return; }
  const r = mc.cfg.gen();
  mc.current = r;
  const optClass = r.panel ? 'option-btn panel' : (r.kind==='word' ? 'option-btn wordopt' : 'option-btn');
  const gridClass = r.cols === 2 ? 'option-grid panels' : 'option-grid';

  el.innerHTML =
    '<p class="section-title">'+mc.cfg.title+'</p>'+
    '<div class="game-progress">'+
      '<div class="progress-track"><div class="progress-fill" style="width:'+((mc.round/mc.total)*100)+'%"></div></div>'+
      '<div class="progress-num">'+(mc.round+1)+'/'+mc.total+'</div>'+
      (mc.streak>=2 ? '<div class="streak-chip">рҹ”Ҙ '+mc.streak+'</div>' : '')+
    '</div>'+
    '<div class="prompt-card">'+
      r.promptHTML+
      (r.speakText ? '<button class="speak-btn" onclick="speak(\''+r.speakText+'\')">рҹ”Ҡ Escuchar</button>' : '')+
    '</div>'+
    '<div class="'+gridClass+'" id="mcoptions">'+
      r.options.map(function(o,i){ return '<button class="'+optClass+'" data-i="'+i+'" onclick="answerMC('+i+')">'+o.label+'</button>'; }).join('')+
    '</div>';
}

function answerMC(i){
  const r = mc.current;
  const picked = r.options[i];
  const btns = document.querySelectorAll('#mcoptions button');
  btns.forEach(function(b){ b.onclick = null; });
  const correctIdx = r.options.findIndex(function(o){ return o.value === r.correctValue; });
  const correctBtn = btns[correctIdx];
  const pickedBtn = btns[i];

  if(picked.value === r.correctValue){
    pickedBtn.classList.add('correct');
    mc.correct++;
    mc.streak++;
    sfxCorrect();
    const bonus = mc.streak>=6 ? 8 : (mc.streak>=3 ? 4 : 0);
    awardXP(8+bonus);
    if(mc.streak>=3 && mc.streak%3===0) sfxStreak();
  }else{
    pickedBtn.classList.add('wrong');
    if(correctBtn) correctBtn.classList.add('correct');
    mc.streak = 0;
    sfxWrong();
  }
  mc.round++;
  setTimeout(drawMCRound, 950);
}

function finishMC(){
  showResult(mc.key, mc.correct, mc.total, false);
}

function renderSilabaUI(){
  const el = document.getElementById('silabas-screen');

  const cur = sGame.current;
  el.innerHTML =
    '<p class="section-title">SГӯlabas</p>'+

      '<div class="progress-track"><div class="progress-fill" style="width:'+((sGame.round/sGame.total)*100)+'%"></div></div>'+
      '<div class="progress-num">'+(sGame.round+1)+'/'+sGame.total+'</div>'+
    '</div>'+
    '<div class="prompt-card">'+
      '<span class="prompt-emoji">'+cur.item.emoji+'</span>'+
      '<div class="syll-slots">'+
        cur.answer.map(function(a){ return '<span class="syll-slot '+(a?'filled':'')+'">'+(a||'')+'</span>'; }).join('')+
      '</div>'+
      '<p class="prompt-hint">Ordena las sГӯlabas</p>'+
    '</div>'+
    '<div class="syll-tiles">'+
      cur.tiles.map(function(t,i){ return '<button class="syll-tile '+(cur.usedTiles[i]?'used':'')+'" '+(cur.usedTiles[i]?'disabled':'')+' onclick="tapSyllable('+i+')">'+t+'</button>'; }).join('')+
    '</div>';
}

function tapSyllable(i){
  const cur = sGame.current;
  if(cur.usedTiles[i]) return;
  const nextSlot = cur.answer.findIndex(function(a){ return a===null; });
  if(nextSlot === -1) return;
  cur.answer[nextSlot] = cur.tiles[i];
  cur.usedTiles[i] = true;
  renderSilabaUI();

  if(cur.answer.every(function(a){ return a!==null; })){
    const built = cur.answer.join('');
    const target = cur.item.syllables.join('');
    setTimeout(function(){
      const slots = document.querySelectorAll('.syll-slot');
      if(built === target){
        slots.forEach(function(s){ s.classList.add('correct'); });
        sGame.correct++;
        sfxCorrect();
        awardXP(8);
        speak(cur.item.word);
      }else{
        slots.forEach(function(s){ s.classList.add('wrong'); });
        sfxWrong();
      }
      sGame.round++;
      setTimeout(drawSilabaRound, 900);
    }, 250);
  }
}

        awardXP(8);
      }else{
        slots.forEach(function(s){ s.classList.add('wrong'); });
        sfxWrong();
      }
      qGame.round++;
      setTimeout(drawSecuenciaRound, 950);
    }, 250);
  }
}

/* ---------------- Memorama (juego a medida) ---------------- */
let mGame = null;

function renderMemoramaIntro(){
  return '<div class="screen" id="memorama-screen">'+
    '<p class="section-title">Letras</p>'+
    '<p class="section-sub">Elige la dificultad del memorama</p>'+
    '<div class="diff-grid">'+
      '<button class="diff-card" onclick="initMemoryGame(\'facil\')"><span class="diff-emoji">рҹҷӮ</span><b>FГЎcil</b><span>6 parejas</span></button>'+
      '<button class="diff-card" onclick="initMemoryGame(\'dificil\')"><span class="diff-emoji">рҹӨ“</span><b>DifГӯcil</b><span>10 parejas</span></button>'+
    '</div>'+
  '</div>';
}

function memoryStars(moves, pairs){
  const par = pairs*2;
  if(moves <= par+2) return 3;
  if(moves <= par+6) return 2;
  if(moves <= par+12) return 1;
  return 0;
}

function initMemoryGame(diff){
  const letters = diff==='dificil' ? MEMORY_LETTERS_HARD : MEMORY_LETTERS_EASY;
  let cards = [];
  letters.forEach(function(l){
    cards.push({ letter:l.toUpperCase(), pairKey:l });
    cards.push({ letter:l.toLowerCase(), pairKey:l });
  });
  cards = shuffle(cards);
  mGame = { cards:cards, flippedIdx:[], matched:{}, moves:0, locked:false, diff:diff };
  drawMemory();
}

function drawMemory(){
  const el = document.getElementById('memorama-screen');
  if(!el) return;
  el.innerHTML =
    '<p class="section-title">Memorama de letras</p>'+
    '<p class="section-sub">Encuentra la mayГәscula y su minГәscula.</p>'+
    '<div class="memory-grid" id="mgrid">'+
      mGame.cards.map(function(c,i){
        return '<div class="mcard '+(mGame.matched[i]?'matched':'')+'" data-i="'+i+'" onclick="flipCard('+i+')">'+
          '<div class="mcard-inner">'+
            '<div class="mface back">?</div>'+
            '<div class="mface front">'+c.letter+'</div>'+
          '</div>'+
        '</div>';
      }).join('')+
    '</div>';
  mGame.cards.forEach(function(c,i){
    if(mGame.flippedIdx.indexOf(i)!==-1 || mGame.matched[i]){
      const node = el.querySelector('.mcard[data-i="'+i+'"]');
      if(node) node.classList.add('flipped');
    }
  });
}

function flipCard(i){
  if(mGame.locked) return;
  if(mGame.matched[i] || mGame.flippedIdx.indexOf(i)!==-1) return;
  if(mGame.flippedIdx.length >= 2) return;

  mGame.flippedIdx.push(i);
  const node = document.querySelector('.mcard[data-i="'+i+'"]');
  if(node) node.classList.add('flipped');

  if(mGame.flippedIdx.length === 2){
    mGame.moves++;
    const a = mGame.flippedIdx[0], b = mGame.flippedIdx[1];
    const cardA = mGame.cards[a], cardB = mGame.cards[b];
    if(cardA.pairKey === cardB.pairKey){
      mGame.matched[a] = true; mGame.matched[b] = true;
      mGame.flippedIdx = [];
      sfxCorrect();
      speak('ВЎPareja!');
      const na = document.querySelector('.mcard[data-i="'+a+'"]');
      const nb = document.querySelector('.mcard[data-i="'+b+'"]');
      if(na) na.classList.add('matched');
      if(nb) nb.classList.add('matched');
      if(Object.keys(mGame.matched).length === mGame.cards.length){
        setTimeout(function(){
          const stars = memoryStars(mGame.moves, mGame.cards.length/2);
          showResult('memorama', stars, 3, true);
        }, 500);
      }
    }else{
      mGame.locked = true;
      sfxWrong();
      setTimeout(function(){
        const na = document.querySelector('.mcard[data-i="'+a+'"]');
        const nb = document.querySelector('.mcard[data-i="'+b+'"]');
        if(na) na.classList.remove('flipped');
        if(nb) nb.classList.remove('flipped');
        mGame.flippedIdx = [];
        mGame.locked = false;
      }, 750);
    }
  }
}

/* ---------------- Reintentar juego ---------------- */
function replayGame(key){
  if(MC_KEYS.indexOf(key)!==-1) initMCGame(key);
  else if(key==='silabas') initSilabasGame();
  else if(key==='secuencia') initSecuenciaGame();
  else if(key==='memorama') render();
}

/* ---------------- Resultado + recompensas ---------------- */
function showResult(moduleKey, correctOrStars, total, isStarsAlready){
  let stars;
  if(isStarsAlready){
    stars = correctOrStars;
    awardXP(stars*15);
  }else{
    const ratio = correctOrStars/total;
    stars = ratio>=0.85 ? 3 : ratio>=0.6 ? 2 : ratio>=0.35 ? 1 : 0;
  }
  state.stars[moduleKey] = Math.max(state.stars[moduleKey], stars);

  const isNewBadge = !state.badges.has(moduleKey) && stars>0;
  if(isNewBadge){
    state.badges.add(moduleKey);
    awardXP(15);
  }

  const app = document.getElementById('app');
  const div = document.createElement('div');
  div.className = 'overlay';
  div.innerHTML =
    '<div class="result-card">'+
      '<div class="float" style="display:flex;justify-content:center;">'+mascotSVG(90)+'</div>'+
      '<p class="result-title">'+(stars>=2 ? 'ВЎExcelente trabajo!' : 'ВЎBuen intento!')+'</p>'+
      '<div class="result-stars">'+[0,1,2].map(function(i){ return starSVG(i<stars); }).join('')+'</div>'+
      '<p class="result-sub">'+(isStarsAlready ? ('Lo lograste en '+mGame.moves+' movimientos.') : ('Acertaste '+correctOrStars+' de '+total+'.'))+'</p>'+
      (isNewBadge ? '<div class="badge-unlock">рҹҸ… ВЎInsignia nueva: '+(MODULE_TITLES[moduleKey]||moduleKey)+'!</div>' : '')+
      '<div class="result-actions">'+
        '<button class="cta-btn secondary" onclick="this.closest(\'.overlay\').remove(); goBack();">Volver al mapa</button>'+
        '<button class="cta-btn" onclick="this.closest(\'.overlay\').remove(); replayGame(\''+moduleKey+'\');">Jugar de nuevo рҹ”Ғ</button>'+
      '</div>'+
    '</div>';
  app.appendChild(div);
  if(stars===3){ spawnConfetti(div.querySelector('.result-card')); }
}

render();
</script>
